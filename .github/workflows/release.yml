# Release @ikenga/cli via Changesets.
#
# Flow: PR with a changeset (`npx changeset`) → on merge to main this opens a
# "chore: version packages" PR → merging that publishes to npm (provenance) and
# creates a GitHub Release. Requires the NPM_TOKEN repo secret.
#
# Build runs via bun (scripts/build.sh); the changeset commands run via npx so
# the publish goes through npm regardless of the dev package manager.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: bun install --frozen-lockfile || bun install

      - name: Build
        run: bun run build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npx changeset publish
          title: 'chore: version packages'
          commit: 'chore: version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
