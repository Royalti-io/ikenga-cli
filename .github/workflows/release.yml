name: Release

# Builds Bun-compiled binaries for every supported target whenever a
# `v*` tag is pushed, then attaches them to a GitHub Release. Also exposes
# workflow_dispatch so we can rebuild a tag manually.
#
# Bun's --compile mode is a cross-compiler: a single Linux runner can emit
# binaries for every target via the --target flag. We don't need a matrix
# of runners.
#
# Targets (https://bun.com/docs/bundler/executables):
#   - bun-linux-x64          (glibc)
#   - bun-linux-arm64        (glibc)
#   - bun-darwin-x64
#   - bun-darwin-arm64
#   - bun-windows-x64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.1). Defaults to the workflow ref.'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile || bun install

      - name: Build all targets
        run: |
          set -e
          mkdir -p artifacts
          for target in bun-linux-x64 bun-linux-arm64 bun-darwin-x64 bun-darwin-arm64 bun-windows-x64; do
            ext=""
            if [[ "$target" == *windows* ]]; then ext=".exe"; fi
            out="artifacts/ikenga-${target#bun-}${ext}"
            echo "→ building $out"
            bun build src/index.ts \
              --compile \
              --target="$target" \
              --outfile "$out"
          done
          ls -la artifacts/

      - name: Generate SHA-256 sums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: ${{ steps.tag.outputs.ref }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/ikenga-linux-x64
            artifacts/ikenga-linux-arm64
            artifacts/ikenga-darwin-x64
            artifacts/ikenga-darwin-arm64
            artifacts/ikenga-windows-x64.exe
            artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
